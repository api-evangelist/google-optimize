aid: google-optimize
name: Google Optimize
description: Google Optimize was a website optimization and A/B testing tool that
  helped businesses test variations of web pages and personalize experiences. Google
  Optimize and Optimize 360 were sunset on September 30, 2023. Google recommends migrating
  to Google Analytics 4 with built-in A/B testing or third-party tools.
