apis:
- aid: google-optimize:optimize-api
  name: Google Optimize API (Sunset)
  description: API for managing Google Optimize experiments, variants, and accessing
    optimization data. Sunset on September 30, 2023. Migrate to Google Analytics 4
    experiments or third-party A/B testing tools.
  humanURL: https://support.google.com/optimize/answer/12979939
